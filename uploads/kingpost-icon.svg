<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Rafters -->
  <line x1="2" y1="27" x2="16" y2="5" stroke="#1E2229" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  <line x1="30" y1="27" x2="16" y2="5" stroke="#1E2229" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Tie beam -->
  <line x1="2" y1="27" x2="30" y2="27" stroke="#1E2229" stroke-width="2" stroke-linecap="round"/>
  <!-- Queen struts -->
  <line x1="16" y1="19" x2="10" y2="13" stroke="#1E2229" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="16" y1="19" x2="22" y2="13" stroke="#1E2229" stroke-width="1.5" stroke-linecap="round"/>
  <!-- King post -->
  <line x1="16" y1="5" x2="16" y2="27" stroke="#2FA871" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Arrow chevrons -->
  <polyline points="13,12 16,15 19,12" stroke="#2FA871" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <polyline points="13,17 16,20 19,17" stroke="#2FA871" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <!-- Arrow tip -->
  <polygon points="16,27 14,24 18,24" fill="#2FA871"/>
  <!-- Joints -->
  <circle cx="2" cy="27" r="1.5" fill="#1E2229"/>
  <circle cx="30" cy="27" r="1.5" fill="#1E2229"/>
  <circle cx="16" cy="5" r="1.5" fill="#1E2229"/>
</svg>
